<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pro RC Controller</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
    body {
      background-color: #0f0f0f; color: white; font-family: Arial, sans-serif;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .top-bar { display: flex; justify-content: center; align-items: center; padding: 10px; background: #1a1a1a; gap: 10px; z-index: 10; border-bottom: 2px solid #00e5ff; }
    input { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: #00e5ff; font-weight: bold; width: 140px; text-align: center; }
    .status { font-size: 14px; color: #aaa; width: 100px; text-align: center; font-weight: bold; }
    
    /* Joysticks Area */
    .joystick-container { display: flex; height: 45%; width: 100%; border-bottom: 2px solid #2a2a2a; background: #121212; }
    .joystick-zone { flex: 1; position: relative; }
    .zone-label { position: absolute; top: 15px; width: 100%; text-align: center; color: #555; font-weight: bold; font-size: 14px; pointer-events: none; letter-spacing: 1px; }
    
    /* Macro Buttons Grid */
    .macro-container {
      flex: 1; padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      overflow-y: auto;
      background: #0a0a0a;
    }
    .macro-btn {
      background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
      color: #ddd; font-size: 12px; font-weight: bold;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.1s, transform 0.1s; gap: 4px;
    }
    .macro-btn:active { background: #00e5ff; color: #000; transform: scale(0.95); border-color: #00e5ff; }
    .macro-btn i { font-style: normal; font-size: 22px; }
    
    .stop-btn { background: #2a0000; border: 1px solid #ff3b3b; color: #ff3b3b; grid-column: span 4; font-size: 16px; padding: 12px; letter-spacing: 2px; }
    .stop-btn:active { background: #ff3b3b; color: white; }
  </style>
</head>
<body>

  <div class="top-bar">
    <label>IP:</label>
    <input type="text" id="ipInput" value="192.168." placeholder="Enter IP">
    <div class="status" id="status">Ready</div>
  </div>

  <div class="joystick-container">
    <div id="zone_left" class="joystick-zone"><div class="zone-label">THROTTLE</div></div>
    <div id="zone_right" class="joystick-zone"><div class="zone-label">STEERING</div></div>
  </div>

  <div class="macro-container">
    <div class="macro-btn" onclick="fireMacro('spin360')"><i>🔄</i> 360 Spin</div>
    <div class="macro-btn" onclick="fireMacro('uturn')"><i>↩️</i> U-Turn</div>
    <div class="macro-btn" onclick="fireMacro('turn90L')"><i>↰</i> 90° L</div>
    <div class="macro-btn" onclick="fireMacro('turn90R')"><i>↱</i> 90° R</div>
    
    <div class="macro-btn" onclick="fireMacro('zigzag')"><i>〰️</i> Zig-Zag</div>
    <div class="macro-btn" onclick="fireMacro('snake')"><i>🐍</i> Snake</div>
    <div class="macro-btn" onclick="fireMacro('circle')"><i>◎</i> Circle</div>
    <div class="macro-btn" onclick="fireMacro('figure8')"><i>∞</i> Figure 8</div>
    
    <div class="macro-btn" onclick="fireMacro('square')"><i>🔲</i> Square</div>
    <div class="macro-btn" onclick="fireMacro('drift')"><i>💨</i> Drift</div>
    <div class="macro-btn" onclick="fireMacro('fwd2')"><i>⏩</i> FWD 2s</div>
    <div class="macro-btn" onclick="fireMacro('rev2')"><i>⏪</i> REV 2s</div>

    <div class="macro-btn stop-btn" onclick="fireMacro('stop')">⏹ STOP AUTO MOVE</div>
  </div>

  <script>
    let throttle = 0; let steering = 0; let lastSent = "";

    const joyL = nipplejs.create({ zone: document.getElementById('zone_left'), mode: 'static', position: { left: '50%', top: '50%' }, color: '#00e5ff', lockY: true });
    const joyR = nipplejs.create({ zone: document.getElementById('zone_right'), mode: 'static', position: { left: '50%', top: '50%' }, color: '#00e5ff', lockX: true });

    joyL.on('move', (evt, data) => { throttle = Math.round((data.distance / 50) * 255 * ((data.angle.degree > 0 && data.angle.degree < 180) ? 1 : -1)); });
    joyL.on('end', () => { throttle = 0; });

    joyR.on('move', (evt, data) => { steering = Math.round((data.distance / 50) * 255 * ((data.angle.degree < 90 || data.angle.degree > 270) ? 1 : -1)); });
    joyR.on('end', () => { steering = 0; });

    // Send joystick commands smoothly
    setInterval(() => {
      let L = Math.max(-255, Math.min(255, throttle + steering));
      let R = Math.max(-255, Math.min(255, throttle - steering));
      let cmd = `L=${L}&R=${R}`;
      if (cmd !== lastSent) {
        lastSent = cmd;
        sendReq(`/drive?${cmd}`);
        if(L === 0 && R === 0) document.getElementById('status').innerText = "Manual";
        else document.getElementById('status').innerText = `L:${L} R:${R}`;
      }
    }, 100);

    // Trigger Special Moves
    function fireMacro(action) {
      document.getElementById('status').innerText = action.toUpperCase();
      sendReq(`/macro?action=${action}`);
      // Send a vibration pulse if the phone supports it
      if (navigator.vibrate) navigator.vibrate(50);
    }

    function sendReq(path) {
      let ip = document.getElementById('ipInput').value;
      if (!ip || ip.endsWith(".")) return;
      fetch(`http://${ip}${path}`).catch(err => console.log("Connection lost", err));
    }
  </script>
</body>
</html>
